# THIS IS AUTOGENERATED. DO NOT EDIT MANUALLY
version = 1
name = "hubble.md"

[setup]
script = '''
set -eu

SOURCE_REPO="/Users/benholmes/Projects/hubble.md"
WORKTREE="${CODEX_WORKTREE_PATH:-$PWD}"

cd "$WORKTREE"

find "$SOURCE_REPO" \
  \( -name '.git' -o -name 'node_modules' \) -prune -o \
  -type f \( -name '.env' -o -name '.env.*' \) ! -name '.env.example' -print |
while IFS= read -r source_file; do
  rel="${source_file#${SOURCE_REPO}/}"
  dest="$WORKTREE/$rel"

  if [ -e "$dest" ] || [ -L "$dest" ]; then
    continue
  fi

  mkdir -p "$(dirname "$dest")"
  cp "$source_file" "$dest"
done

pnpm install
'''
